<!-- src/test_env/pages/overview.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Overview - Test Page</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        h1 { color: #28a745; }
        p { color: #666; }
        .container { max-width: 800px; margin: auto; }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>System Overview (Test Page)</h1>
        <p>This page simulates the system overview with dummy data.</p>
        <div id="app-container">
            <table>
                <thead>
                    <tr>
                        <th>Metric</th>
                        <th>Value</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>CPU Load</td>
                        <td>35%</td>
                        <td style="color: green;">OK</td>
                    </tr>
                    <tr>
                        <td>Memory Usage</td>
                        <td>60%</td>
                        <td style="color: green;">OK</td>
                    </tr>
                    <tr>
                        <td>Disk Space</td>
                        <td>85%</td>
                        <td style="color: orange;">Warning</td>
                    </tr>
                    <tr>
                        <td>Network Latency</td>
                        <td>120ms</td>
                        <td style="color: red;">Critical</td>
                    </tr>
                </tbody>
            </table>
            <a href="index.html" class="button">Back to Home</a>
        </div>
    </div>
</body>
</html>
