<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Alarms - Test Page</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        h1 { color: #dc3545; }
        p { color: #666; }
        .container { max-width: 800px; margin: auto; }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Active Alarms (Test Data)</h1>
        <p>This page simulates the active alarms view.</p>
        <div id="app-container">
            <table>
                <thead>
                    <tr>
                        <th>Priority</th>
                        <th>State</th>
                        <th>Alarm</th>
                        <th>Source</th>
                        <th>Active Time</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>High</td>
                        <td>Active</td>
                        <td>Test Alarm 1: System Overload</td>
                        <td>/System/CPU</td>
                        <td>2024-01-01 10:00:00</td>
                    </tr>
                    <tr>
                        <td>Medium</td>
                        <td>Active</td>
                        <td>Test Alarm 2: Low Memory</td>
                        <td>/System/Memory</td>
                        <td>2024-01-01 10:05:00</td>
                    </tr>
                </tbody>
            </table>
            <a href="index.html" class="button">Back to Home</a>
        </div>
    </div>
</body>
</html>
